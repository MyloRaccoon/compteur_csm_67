<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur vers 16h00</title>
    <!-- Police monospace pour que les chiffres ne bougent pas -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-label: #94a3b8;
            --color-1: #38bdf8; /* Bleu */
            --color-2: #4ade80; /* Vert */
            --color-3: #facc15; /* Jaune */
            --color-4: #f472b6; /* Rose */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px; /* Limite la largeur sur PC pour rester lisible */
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            background: linear-gradient(to right, var(--color-1), var(--color-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Style commun pour chaque ligne de compteur */
        .counter-row {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .counter-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .label {
            font-size: 0.9rem;
            color: var(--text-label);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .value {
            font-size: 3.5rem; /* Taille par défaut pour PC */
            font-weight: 800;
            line-height: 1.2;
            word-break: break-all; /* Permet au nombre de millisecondes de passer à la ligne si trop long */
        }

        /* Couleurs spécifiques pour chaque ligne */
        .row-1 .value { color: var(--color-1); }
        .row-2 .value { color: var(--color-2); }
        .row-3 .value { color: var(--color-3); }
        .row-4 .value { color: var(--color-4); font-size: 2.5rem; } /* Un peu plus petit pour les ms */

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
                margin-bottom: 20px;
            }

            .value {
                font-size: 2.5rem; /* Réduit la taille sur mobile */
            }

            .row-4 .value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>En attente de 16h00</h1>
        
        <!-- 1. Format Classique -->
        <div class="counter-row row-1">
            <div class="label">Heures : Minutes : Secondes</div>
            <div class="value" id="hms-display">00:00:00</div>
        </div>

        <!-- 2. Minutes restantes -->
        <div class="counter-row row-2">
            <div class="label">Minutes : Secondes</div>
            <div class="value" id="ms-display">00:00</div>
        </div>

        <!-- 3. Total Secondes -->
        <div class="counter-row row-3">
            <div class="label">Total Secondes</div>
            <div class="value" id="s-display">0</div>
        </div>

        <!-- 4. Total Millisecondes -->
        <div class="counter-row row-4">
            <div class="label">Total Millisecondes</div>
            <div class="value" id="ms-total-display">0</div>
        </div>
    </div>

    <script>
        function getNext16h() {
            const now = new Date();
            const target = new Date();
            
            // On fixe l'heure cible à 16h00 aujourd'hui
            target.setHours(16, 0, 0, 0);

            // Si on a déjà dépassé 16h aujourd'hui, on vise 16h demain
            if (now.getTime() > target.getTime()) {
                target.setDate(target.getDate() + 1);
            }

            return target;
        }

        let targetTime = getNext16h();

        function updateCountdown() {
            const now = new Date();
            const diff = targetTime - now;

            // Si le temps est écoulé (arrivé à 16h)
            if (diff <= 0) {
                targetTime = getNext16h();
                // Reset visuel
                document.getElementById('hms-display').innerText = "00:00:00";
                document.getElementById('ms-display').innerText = "00:00";
                document.getElementById('s-display').innerText = "0";
                document.getElementById('ms-total-display').innerText = "0";
                return;
            }

            // --- Calculs ---

            // 1. Heures, Minutes, Secondes (HH:MM:SS)
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            // 2. Minutes totales restantes (MM:SS)
            const totalMinutes = Math.floor(diff / (1000 * 60));
            const remainingSeconds = Math.floor((diff / 1000) % 60);

            // 3. Secondes totales
            const totalSeconds = Math.floor(diff / 1000);

            // 4. Total Millisecondes (C'est juste la différence brute)
            const totalMilliseconds = diff;

            // --- Affichage ---
            
            const pad = (num) => num.toString().padStart(2, '0');

            // 1. HH:MM:SS
            document.getElementById('hms-display').innerText = 
                `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;

            // 2. MM:SS
            document.getElementById('ms-display').innerText = 
                `${totalMinutes}:${pad(remainingSeconds)}`;

            // 3. Total Secondes (avec séparateur de milliers pour la lisibilité)
            document.getElementById('s-display').innerText = totalSeconds.toLocaleString('fr-FR');

            // 4. Total Millisecondes (avec séparateur de milliers)
            document.getElementById('ms-total-display').innerText = totalMilliseconds.toLocaleString('fr-FR');

            // Boucle de rafraîchissement ultra rapide
            requestAnimationFrame(updateCountdown);
        }

        // Lancer le compteur
        updateCountdown();
    </script>
</body>
</html>
