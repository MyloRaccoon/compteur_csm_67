<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur vers 16h00</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-label: #94a3b8;
            --color-1: #38bdf8;
            --color-2: #4ade80;
            --color-3: #facc15;
            --color-4: #f472b6;
            --bar-active: #38bdf8;
            --bar-inactive: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            background: linear-gradient(to right, var(--color-1), var(--color-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter-row {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .counter-row:last-of-type {
            border-bottom: none;
            margin-bottom: 40px;
        }

        .label {
            font-size: 0.8rem;
            color: var(--text-label);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            word-break: break-all;
        }

        .row-1 .value { color: var(--color-1); }
        .row-2 .value { color: var(--color-2); }
        .row-3 .value { color: var(--color-3); }
        .row-4 .value { color: var(--color-4); font-size: 2rem; }

        /* --- STYLE DE LA BARRE --- */
        .seconds-bar-container {
            width: 100%;
            display: grid;
            /* Grille responsive qui s'adapte à la largeur */
            grid-template-columns: repeat(auto-fill, minmax(3px, 1fr)); 
            gap: 1px;
            background-color: var(--bar-inactive);
            padding: 2px;
            border-radius: 4px;
            opacity: 0.9;
        }

        .block {
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--bar-active);
            border-radius: 1px;
            /* Pas de transition ici pour éviter le lag sur 3600 éléments */
        }

        .block.off {
            background-color: var(--bar-inactive);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; margin-bottom: 20px; }
            .value { font-size: 2.2rem; }
            .row-4 .value { font-size: 1.6rem; }
            .seconds-bar-container {
                grid-template-columns: repeat(auto-fill, minmax(2px, 1fr));
                gap: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>En attente de 16h00</h1>
        
        <div class="counter-row row-1">
            <div class="label">Heures : Minutes : Secondes</div>
            <div class="value" id="hms-display">00:00:00</div>
        </div>

        <div class="counter-row row-2">
            <div class="label">Minutes : Secondes</div>
            <div class="value" id="ms-display">00:00</div>
        </div>

        <div class="counter-row row-3">
            <div class="label">Total Secondes</div>
            <div class="value" id="s-display">0</div>
        </div>

        <div class="counter-row row-4">
            <div class="label">Total Millisecondes</div>
            <div class="value" id="ms-total-display">0</div>
        </div>

        <div class="label" style="margin-bottom: 10px; width: 100%; text-align: left;">Progression de l'heure (3600s)</div>
        <div class="seconds-bar-container" id="seconds-bar"></div>
    </div>

    <script>
        // --- 1. GÉNÉRATION DE LA BARRE ---
        const barContainer = document.getElementById('seconds-bar');
        const totalBlocks = 3600;
        const blocksArray = [];

        // Création des blocs au chargement
        for (let i = 0; i < totalBlocks; i++) {
            const block = document.createElement('div');
            block.classList.add('block');
            barContainer.appendChild(block);
            blocksArray.push(block);
        }

        // Variable pour suivre l'état précédent et optimiser les mises à jour
        let lastSecondsElapsed = -1;

        function getNext16h() {
            const now = new Date();
            const target = new Date();
            target.setHours(16, 0, 0, 0);
            if (now.getTime() > target.getTime()) {
                target.setDate(target.getDate() + 1);
            }
            return target;
        }

        let targetTime = getNext16h();

        function updateCountdown() {
            const now = new Date();
            const diff = targetTime - now;

            // Gestion du passage à 16h
            if (diff <= 0) {
                targetTime = getNext16h();
                // Reset texte
                document.getElementById('hms-display').innerText = "00:00:00";
                document.getElementById('ms-display').innerText = "00:00";
                document.getElementById('s-display').innerText = "0";
                document.getElementById('ms-total-display').innerText = "0";
                // On force le reset de la barre au prochain tour de boucle
                lastSecondsElapsed = -1; 
                requestAnimationFrame(updateCountdown);
                return;
            }

            // --- Calculs des compteurs ---
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);
            const totalMinutes = Math.floor(diff / (1000 * 60));
            const remainingSeconds = Math.floor((diff / 1000) % 60);
            const totalSeconds = Math.floor(diff / 1000);
            const totalMilliseconds = diff;

            const pad = (num) => num.toString().padStart(2, '0');

            document.getElementById('hms-display').innerText = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            document.getElementById('ms-display').innerText = `${totalMinutes}:${pad(remainingSeconds)}`;
            document.getElementById('s-display').innerText = totalSeconds.toLocaleString('fr-FR');
            document.getElementById('ms-total-display').innerText = totalMilliseconds.toLocaleString('fr-FR');

            // --- LOGIQUE CORRIGÉE DE LA BARRE ---
            
            const currentHour = now.getHours();
            const currentMin = now.getMinutes();
            const currentSec = now.getSeconds();
            
            // Nombre de secondes écoulées depuis le début de l'heure actuelle (0 à 3599)
            const currentSecondsElapsed = (currentMin * 60) + currentSec;

            // Si on change d'heure (ex: 15:59:59 -> 16:00:00), le compteur retombe à 0
            if (currentSecondsElapsed < lastSecondsElapsed) {
                // C'est une nouvelle heure, on rallume TOUT
                blocksArray.forEach(b => b.classList.remove('off'));
                lastSecondsElapsed = currentSecondsElapsed;
            } 
            // Sinon, on éteint les blocs qui se sont écoulés depuis la dernière frame
            else if (currentSecondsElapsed > lastSecondsElapsed) {
                // On boucle seulement sur la différence (généralement 1 bloc, parfois plus si lag)
                for (let i = lastSecondsElapsed + 1; i <= currentSecondsElapsed; i++) {
                    if (blocksArray[i]) {
                        blocksArray[i].classList.add('off');
                    }
                }
                lastSecondsElapsed = currentSecondsElapsed;
            }
            // Si égal, on ne fait rien (gain de performance)

            requestAnimationFrame(updateCountdown);
        }

        updateCountdown();
    </script>
</body>
</html>
